<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — WorkForce HRMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-brand-900 via-brand-700 to-indigo-800 flex items-center justify-center p-4"
  style="--tw-gradient-from: #312e81; --tw-gradient-via: #4338ca; --tw-gradient-to: #4338ca;">
<style>
  .bg-brand-bg { background: linear-gradient(135deg, #312e81, #4338ca, #4f46e5); }
</style>
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <div class="w-14 h-14 bg-white bg-opacity-10 rounded-2xl flex items-center justify-center mx-auto mb-3 backdrop-blur">
      <i class="fas fa-building text-white text-2xl"></i>
    </div>
    <h1 class="text-white font-bold text-2xl">WorkForce</h1>
    <p class="text-indigo-200 text-sm mt-1">Human Resource Management System</p>
  </div>
  <div class="bg-white rounded-3xl shadow-2xl p-8">
    <h2 class="text-slate-800 font-semibold text-xl mb-6">Welcome back</h2>
    {% if form.errors %}
    <div class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl mb-4">
      <i class="fas fa-circle-exclamation mr-2"></i>Invalid username or password.
    </div>
    {% endif %}
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-slate-600 text-sm font-medium mb-1.5">Username</label>
        <input type="text" name="username" autofocus required
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100">
      </div>
      <div>
        <label class="block text-slate-600 text-sm font-medium mb-1.5">Password</label>
        <input type="password" name="password" required
          class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit"
        class="w-full py-2.5 rounded-xl font-semibold text-white text-sm transition-all hover:opacity-90 active:scale-[0.98] mt-2"
        style="background: linear-gradient(135deg, #4f46e5, #6366f1)">
        Sign in <i class="fas fa-arrow-right ml-2"></i>
      </button>
    </form>
  </div>
  <p class="text-center text-indigo-300 text-xs mt-6">WorkForce HRMS &copy; 2024</p>
</div>
</body>
</html>
